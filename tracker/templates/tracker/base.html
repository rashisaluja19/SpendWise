<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    /* 🌗 CLEAN GLOBAL THEME INVERSION OVERRIDES */
    [data-theme="dark"] {
        background-color: #121212 !important;
        color: #e0e0e0 !important;
    }
    
    [data-theme="dark"] body,
    [data-theme="dark"] .card,
    [data-theme="dark"] .navbar,
    [data-theme="dark"] .list-group-item,
    [data-theme="dark"] .bg-white,
    [data-theme="dark"] .alert,
    [data-theme="dark"] form,
    [data-theme="dark"] .table-responsive {
        background-color: #1e1e1e !important;
        color: #e0e0e0 !important;
        border-color: #2d2d2d !important;
    }

    [data-theme="dark"] h1, [data-theme="dark"] h2, [data-theme="dark"] h3,
    [data-theme="dark"] h4, [data-theme="dark"] h5, [data-theme="dark"] h6,
    [data-theme="dark"] .text-dark, [data-theme="dark"] .fw-bold {
        color: #ffffff !important;
    }

    [data-theme="dark"] .text-muted, [data-theme="dark"] label,
    [data-theme="dark"] footer, [data-theme="dark"] small {
        color: #b0b0b0 !important;
    }

    [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea {
        background-color: #2a2a2a !important;
        color: #ffffff !important;
        border-color: #444444 !important;
    }
    
    [data-theme="dark"] input::placeholder {
        color: #777777 !important;
    }

    [data-theme="dark"] .table {
        color: #e0e0e0 !important;
    }
    [data-theme="dark"] .table-light, [data-theme="dark"] thead, [data-theme="dark"] tr {
        background-color: #252525 !important;
        color: #ffffff !important;
    }
    [data-theme="dark"] td, [data-theme="dark"] th {
        background-color: transparent !important;
        border-bottom-color: #333333 !important;
    }

    [data-theme="dark"] .mx-0[style*="background: linear-gradient"] {
        background: linear-gradient(to right, #1e1e1e, #2d1f1f) !important;
        border-color: #3a2222 !important;
    }

    /* 🎯 1. Active Navigation Tab Text Contrast Fix */
    [data-theme="dark"] .navbar-nav .nav-link.active {
        color: #212529 !important; /* Forces bold charcoal dark contrast layer inside active tab container */
        background-color: #f8f9fa !important;
    }

    /* 🎯 2. Category Badges Structural Background Shifts */
    [data-theme="dark"] .badge.bg-light.text-dark.border {
        background-color: #343a40 !important; /* Converts past light asset structures into deep onyx */
        color: #f8f9fa !important; /* Converts embedded texts into distinct bright layers */
        border-color: #495057 !important;
    }
</style>
</head>
<body>

    <div class="container py-4">
        {% block content %}
        {% endblock %}
    </div>
    <script>
    const toggleBtn = document.getElementById('themeToggle');
    const currentTheme = localStorage.getItem('theme') || 'light';

    if (currentTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        if(toggleBtn) toggleBtn.innerHTML = "Light";
    }

    if(toggleBtn) {
        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                toggleBtn.innerHTML = "Dark";
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleBtn.innerHTML = "Light";
            }
        });
    }
</script>
</body>
</html>
